<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/members/signup.css}">
    <title>회원가입</title>
</head>
<body>
<div class="signup-container">
    <h2>회원가입</h2>
    <form class="signup-form" th:action="@{/members/signup}" method="post" th:object="${memberDto}">
        <div class="input-group">
            <input type="text" placeholder="아이디" th:field="*{email}" required>
            <button class="email-auth" type="button" onclick="mailAuth();">이메일 인증</button>
        </div>
        <div class="input-group">
            <input type="password" placeholder="비밀번호" th:field="*{password}" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="비밀번호 확인" th:field="*{passwordCnf}" required>
        </div>
        <p>---------------------선택-----------------------</p>
        <div class="input-group">
            <input type="text" placeholder="이름">
        </div>
        <div class="input-group">
            <input type="text" placeholder="전화번호">
        </div>
        <button class="signup-btn" type="submit">회원가입</button>
        <p class="login-link">이미 계정이 있으신가요? <a th:href="@{/members/login}">로그인</a></p>
    </form>
</div>
</body>
</html>
